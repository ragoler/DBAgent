apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-agent
  namespace: dev
  labels:
    app: db-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-agent
  template:
    metadata:
      labels:
        app: db-agent
    spec:
      serviceAccountName: dbagent-ksa-dev
      containers:
      - name: db-agent
        image: test
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: db-agent-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
apiVersion: v1
kind: Service
metadata:
  name: db-agent-service
  namespace: dev
spec:
  selector:
    app: db-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
