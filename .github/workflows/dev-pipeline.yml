name: Dev Pipeline

on:
  push:
    branches:
      - dev

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: "write"
      id-token: "write"
      pull-requests: "write"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest httpx
        
      - name: Run Unit and Integration Tests
        env:
          GEMINI_API_KEY: "dummy-key-for-tests"
        run: |
          pytest -m "not e2e"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run deploy.sh for Dev
        # We explicitly set skip infra because IAM/etc usually isn't done from CI but
        # deploy.sh has logic for it if needed.
        run: |
          chmod +x deploy.sh
          ./deploy.sh --namespace dev --no-infra

      - name: Run E2E Network Tests
        # Wait for deployment to stabilize, then run E2E
        run: |
          sleep 15
          # The exact endpoint/IP would normally be injected here, but assuming it's available or port-forwarded:
          export DB_AGENT_API_URL=${{ secrets.DEV_API_URL }}
          pytest backend/tests/test_true_e2e.py -v

      - name: Create Pull Request to Main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only create PR if tests pass
          gh pr create \
            --base main \
            --head dev \
            --title "Automated PR: Merge Dev to Main" \
            --body "This PR was automatically generated by the Dev Pipeline after successful deployment and E2E testing in the \`dev\` namespace." \
            || echo "A PR might already exist."
