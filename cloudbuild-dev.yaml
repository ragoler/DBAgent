steps:
  # 1. Install dependencies and run unit/integration tests
  - name: 'python:3.11'
    entrypoint: 'bash'
    env:
      - 'GEMINI_API_KEY=dummy-key-for-tests'
    args:
      - '-c'
      - |
        pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx
        export PYTHONPATH=.
        pytest -m "not e2e"

  # 3. Build docker image and deploy using predefined script
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        chmod +x deploy.sh
        # Force the deploy script to use the dev namespace and skip the API/IAM enabling steps
        ./deploy.sh --namespace dev --no-infra

  # 4. Get the external IP address of the deployed service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials adk-cluster --region us-west1 --project ragoler-gke-dev
        echo "Waiting up to 60s for LoadBalancer IP..."
        for i in {1..12}; do
          IP=$(kubectl get svc db-agent-service -n dev -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          if [ -n "$IP" ]; then
            echo "Found IP: $IP"
            echo "http://$IP" > workspace_url.txt
            break
          fi
          sleep 5
        done
        if [ ! -f workspace_url.txt ]; then
          echo "Error: Failed to get external IP"
          exit 1
        fi

  # 5. Run E2E Network Tests against the deployed Dev environment
  - name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install pytest httpx
        pip install -r backend/requirements.txt
        # Wait extra time for the application to boot
        sleep 10
        export DB_AGENT_API_URL=$(cat workspace_url.txt)
        export PYTHONPATH=.
        pytest backend/tests/test_true_e2e.py -v

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
